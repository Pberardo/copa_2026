<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playoffs - Copa do Mundo 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-emerald-400">Mata-Mata Copa 2026</h1>
                <p class="text-slate-400 mt-2">Fase eliminatória rumo ao título mundial</p>
            </div>
            <nav class="mt-4 md:mt-0 flex flex-wrap gap-2 md:gap-4">
                <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg border border-slate-700 transition-colors text-sm md:text-base">Fase de Grupos</a>
                <a href="playoffs.html" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-semibold border border-emerald-500 transition-colors text-sm md:text-base">Mata-Mata</a>
                <a href="artilheiros.html" class="bg-slate-800 hover:bg-slate-700 hover:border-yellow-500/50 text-slate-300 px-4 py-2 rounded-lg border border-slate-700 transition-all flex items-center gap-1.5 text-sm md:text-base">
                 Artilheiros
                </a>
            </nav>
        </header>

        <section class="mb-12">
            <h2 class="text-2xl font-bold mb-6 text-emerald-300 flex items-center gap-2">
                <span>🔑</span> Chaveamento da Copa
            </h2>
            <div class="overflow-x-auto pb-6">
                <div id="chaveamento-container" class="flex gap-8 min-w-[1200px] justify-between items-stretch">
                    </div>
            </div>
        </section>

        <hr class="border-slate-800 my-10">

        <section>
            <h2 class="text-2xl font-bold mb-6 text-emerald-300 flex items-center gap-2">
                <span>📅</span> Calendário de Partidas Eliminatórias
            </h2>
            <div id="jogos-playoffs-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-center text-slate-500 col-span-full animate-pulse">Carregando cruzamentos oficiais...</p>
            </div>
        </section>
    </div>

    <script src="playoffs.js"></script>
</body>
</html>
